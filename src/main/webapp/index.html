<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusRes — 校园上网指南资源库</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<header id="navbar"></header>

<!-- Hero -->
<section class="hero-section">
  <div class="hero-glow"></div>
  <div class="container">
    <h1 class="hero-title">校园上网指南资源库</h1>
    <p class="hero-subtitle">
      一站式解决大学生上网刚需 — Steam、加速器、BT种子、GitHub、API 对接……你想要的这里都有。
    </p>
    <div class="hero-search">
      <input type="text" id="heroSearchInput" placeholder="搜索工具、教程、资源……">
      <button id="heroSearchBtn"><i class="bi bi-search"></i> 搜索</button>
    </div>

    <!-- 统计面板 -->
    <div class="stats-row" id="statsRow">
      <div class="stat-item"><div class="stat-number skeleton" style="width:60px;height:36px;display:inline-block;"></div><div class="stat-label">资源总数</div></div>
      <div class="stat-item"><div class="stat-number skeleton" style="width:60px;height:36px;display:inline-block;"></div><div class="stat-label">教程文章</div></div>
      <div class="stat-item"><div class="stat-number skeleton" style="width:60px;height:36px;display:inline-block;"></div><div class="stat-label">注册用户</div></div>
    </div>
  </div>
</section>

<!-- 分类导航 -->
<section class="container mb-5">
  <h2 class="section-title">资源分类</h2>
  <div class="category-grid" id="categoryGrid"></div>
</section>

<!-- 最新资源 -->
<section class="container mb-5">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="section-title mb-0">最新资源</h2>
    <a href="pages/resources.html" class="text-decoration-none" style="color:var(--blue);">查看全部 <i class="bi bi-arrow-right"></i></a>
  </div>
  <div class="row g-3" id="latestResources"></div>
</section>

<!-- 热门下载 -->
<section class="container mb-5">
  <h2 class="section-title">热门下载</h2>
  <div class="row g-3" id="hotResources"></div>
</section>

<footer id="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script>
(function() {
  const catIcons = {
    1: { cls: 'cat-steam', icon: 'bi-steam', name: 'Steam 相关' },
    2: { cls: 'cat-vpn', icon: 'bi-globe2', name: 'VPN与加速器' },
    3: { cls: 'cat-bt', icon: 'bi-download', name: 'BT/种子与下载' },
    4: { cls: 'cat-github', icon: 'bi-github', name: 'GitHub 与开源' },
    5: { cls: 'cat-api', icon: 'bi-braces', name: 'API 对接实战' },
    6: { cls: 'cat-other', icon: 'bi-tools', name: '其他工具' },
  };

  function getCatTagCls(catId) {
    const map = { 1:'steam', 2:'vpn', 3:'bt', 4:'github', 5:'api', 6:'other' };
    return 'cat-tag cat-tag-' + (map[catId] || 'other');
  }

  function renderCategories(cats) {
    const grid = document.getElementById('categoryGrid');
    if (!cats.length) return;
    grid.innerHTML = cats.map(c => {
      const info = catIcons[c.id] || { cls: 'cat-other', icon: 'bi-folder', name: c.name };
      return `<a href="pages/resources.html?categoryId=${c.id}" class="category-card ${info.cls}">
        <span class="cat-icon"><i class="bi ${info.icon}"></i></span>
        <span class="cat-name">${info.name}</span>
      </a>`;
    }).join('');
  }

  function renderResources(list, containerId) {
    const el = document.getElementById(containerId);
    if (!list.length) {
      el.innerHTML = '<div class="col-12 empty-state"><span class="empty-icon"><i class="bi bi-inbox"></i></span><div class="empty-title">暂无资源</div></div>';
      return;
    }
    el.innerHTML = list.map(r => `
      <div class="col-lg-3 col-md-4 col-sm-6">
        <a href="pages/resource-detail.html?id=${r.id}" class="text-decoration-none">
          <div class="resource-card">
            <div class="rc-title">${escHtml(r.title)}</div>
            <div class="rc-desc">${escHtml(r.description || '暂无描述')}</div>
            <div class="rc-meta">
              <span class="${getCatTagCls(r.categoryId)}">${escHtml(r.categoryName || '')}</span>
              <span><i class="bi bi-download"></i> ${r.downloadCount || 0}</span>
              <span><i class="bi bi-clock"></i> ${formatDate(r.createdAt)}</span>
            </div>
          </div>
        </a>
      </div>`).join('');
  }

  async function init() {
    const searchInput = document.getElementById('heroSearchInput');
    document.getElementById('heroSearchBtn').addEventListener('click', () => {
      const kw = searchInput.value.trim();
      if (kw) location.href = 'pages/resources.html?keyword=' + encodeURIComponent(kw);
    });
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const kw = e.target.value.trim();
        if (kw) location.href = 'pages/resources.html?keyword=' + encodeURIComponent(kw);
      }
    });

    try {
      const [cats, latest, hot, stats] = await Promise.all([
        API.get('/api/resources/categories').catch(() => null),
        API.get('/api/resources', { page: 1, size: 8, sort: 'latest' }).catch(() => null),
        API.get('/api/resources', { page: 1, size: 8, sort: 'downloads' }).catch(() => null),
        API.get('/api/stats').catch(() => null),
      ]);

      if (cats) {
        renderCategories(Array.isArray(cats) ? cats : (cats.records || cats));
      } else {
        const defaults = [
          { id:1, name:'Steam 相关' }, { id:2, name:'VPN与加速器' }, { id:3, name:'BT/种子与下载' },
          { id:4, name:'GitHub 与开源' }, { id:5, name:'API 对接实战' }, { id:6, name:'其他工具' },
        ];
        renderCategories(defaults);
      }

      const latestList = latest ? (Array.isArray(latest) ? latest : (latest.records || [])) : [];
      const hotList = hot ? (Array.isArray(hot) ? hot : (hot.records || [])) : [];
      renderResources(latestList, 'latestResources');
      renderResources(hotList, 'hotResources');

      if (stats) {
        document.getElementById('statsRow').innerHTML = `
          <div class="stat-item"><div class="stat-number">${stats.resourceCount || 0}</div><div class="stat-label">资源总数</div></div>
          <div class="stat-item"><div class="stat-number">${stats.articleCount || 0}</div><div class="stat-label">教程文章</div></div>
          <div class="stat-item"><div class="stat-number">${stats.userCount || 0}</div><div class="stat-label">注册用户</div></div>`;
      }
    } catch {
      // 后端未启动时使用占位数据
      const defaults = [
        { id:1, name:'Steam 相关' }, { id:2, name:'VPN与加速器' }, { id:3, name:'BT/种子与下载' },
        { id:4, name:'GitHub 与开源' }, { id:5, name:'API 对接实战' }, { id:6, name:'其他工具' },
      ];
      renderCategories(defaults);
      document.getElementById('statsRow').innerHTML = `
        <div class="stat-item"><div class="stat-number">0</div><div class="stat-label">资源总数</div></div>
        <div class="stat-item"><div class="stat-number">0</div><div class="stat-label">教程文章</div></div>
        <div class="stat-item"><div class="stat-number">0</div><div class="stat-label">注册用户</div></div>`;
    }
  }

  init();
})();
</script>
</body>
</html>
