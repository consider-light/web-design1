<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教程详情 — CampusRes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<header id="navbar"></header>

<div class="container py-4">
  <div class="breadcrumb-nav">
    <a href="../index.html">首页</a><span class="separator">/</span><a href="articles.html">教程课堂</a><span class="separator">/</span><span id="breadcrumbTitle">加载中……</span>
  </div>

  <div id="loadingState">
    <div class="skeleton" style="height:40px;width:60%;margin-bottom:16px;"></div>
    <div class="skeleton" style="height:20px;width:40%;margin-bottom:40px;"></div>
    <div class="skeleton" style="height:400px;border-radius:var(--radius);"></div>
  </div>

  <div id="detailContent" style="display:none;">
    <div class="detail-header">
      <h1 id="articleTitle"></h1>
      <div class="detail-meta" id="articleMeta"></div>
    </div>
    <div class="detail-content" id="articleContent"></div>
    <div class="mt-4">
      <a href="articles.html" class="btn btn-outline-light">
        <i class="bi bi-arrow-left me-2"></i>返回教程列表
      </a>
    </div>
  </div>

  <div id="errorState" style="display:none;" class="empty-state">
    <span class="empty-icon"><i class="bi bi-exclamation-triangle"></i></span>
    <div class="empty-title">文章不存在或已删除</div>
    <a href="articles.html" class="btn btn-accent mt-3">返回教程课堂</a>
  </div>
</div>

<footer id="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script>
(async function() {
  const id = getQueryParam('id');
  if (!id) { showError(); return; }

  function showError() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('detailContent').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
  }

  function getCatTagCls(catId) {
    const map = { 1:'steam', 2:'vpn', 3:'bt', 4:'github', 5:'api', 6:'other' };
    return 'cat-tag cat-tag-' + (map[catId] || 'other');
  }

  // 配置 marked
  if (typeof marked !== 'undefined') {
    marked.setOptions({
      breaks: true,
      gfm: true,
    });
  }

  try {
    const article = await API.get('/api/articles/' + id);
    if (!article) { showError(); return; }

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('detailContent').style.display = '';

    document.getElementById('breadcrumbTitle').textContent = article.title;
    document.getElementById('articleTitle').textContent = article.title;
    document.getElementById('articleMeta').innerHTML = `
      ${article.categoryId ? `<span class="${getCatTagCls(article.categoryId)}">${escHtml(article.categoryName || '')}</span>` : ''}
      <span><i class="bi bi-person"></i> ${escHtml(article.authorName || '匿名')}</span>
      <span><i class="bi bi-clock"></i> ${formatDate(article.createdAt)}</span>
      <span><i class="bi bi-eye"></i> ${article.viewCount || 0} 阅读</span>`;

    const content = article.content || '*暂无内容*';
    try {
      document.getElementById('articleContent').innerHTML = marked.parse(content);
    } catch {
      document.getElementById('articleContent').innerHTML = `<pre>${escHtml(content)}</pre>`;
    }

    document.title = article.title + ' — CampusRes';
  } catch { showError(); }
})();
</script>
</body>
</html>
