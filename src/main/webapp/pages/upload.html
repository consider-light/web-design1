<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传资源 — CampusRes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<header id="navbar"></header>

<div class="container py-4">
  <div class="breadcrumb-nav">
    <a href="../index.html">首页</a><span class="separator">/</span>上传资源
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="form-card" style="max-width:100%;">
        <h1 class="form-title">上传新资源</h1>
        <p class="form-subtitle">分享你发现的优质工具与资源</p>

        <form id="uploadForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="title">资源标题 <span style="color:var(--accent);">*</span></label>
            <input type="text" class="form-control" id="title" placeholder="给资源起个清晰的名字" required maxlength="100">
            <div class="invalid-feedback" id="titleFeedback"></div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="description">资源描述</label>
            <textarea class="form-control" id="description" placeholder="介绍一下这个资源的用途、使用方法……"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label" for="categoryId">所属分类 <span style="color:var(--accent);">*</span></label>
            <select class="form-select" id="categoryId" required>
              <option value="">请选择分类</option>
            </select>
            <div class="invalid-feedback" id="categoryIdFeedback"></div>
          </div>

          <div class="mb-4">
            <label class="form-label">文件上传 <span style="color:var(--accent);">*</span></label>
            <div class="file-upload-zone" id="uploadZone">
              <div class="upload-icon"><i class="bi bi-cloud-upload"></i></div>
              <div class="upload-text">点击选择文件或拖拽到此处</div>
              <div class="upload-hint">支持 .zip .rar .7z .pdf .png .jpg，最大 50MB</div>
              <input type="file" id="fileInput" accept=".zip,.rar,.7z,.pdf,.png,.jpg,.jpeg,.gif,.txt,.md,.exe,.msi,.apk">
            </div>
            <div class="file-selected" id="fileSelected">
              <i class="bi bi-file-earmark"></i>
              <span class="file-name" id="selectedFileName"></span>
              <span class="file-size" id="selectedFileSize"></span>
              <span class="file-remove" id="fileRemove"><i class="bi bi-x-circle"></i></span>
            </div>
            <div class="invalid-feedback" id="fileFeedback"></div>
          </div>

          <button type="submit" class="btn btn-primary-full" id="submitBtn">
            <i class="bi bi-cloud-upload me-2"></i>上传资源
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<footer id="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script>
(async function() {
  // 权限检查
  const user = await checkAuth();
  if (!user) return;

  let selectedFile = null;

  // 加载分类下拉
  try {
    const cats = await API.get('/api/resources/categories');
    const list = Array.isArray(cats) ? cats : (cats.records || cats || []);
    document.getElementById('categoryId').innerHTML = '<option value="">请选择分类</option>' +
      list.map(c => `<option value="${c.id}">${escHtml(c.name)}</option>`).join('');
  } catch {}

  // 文件选择
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const fileSelected = document.getElementById('fileSelected');
  const MAX_SIZE = 50 * 1024 * 1024; // 50MB
  const ALLOWED = ['.zip','.rar','.7z','.pdf','.png','.jpg','.jpeg','.gif','.txt','.md','.exe','.msi','.apk'];

  function selectFile(file) {
    if (!file) return;
    const ext = '.' + file.name.split('.').pop().toLowerCase();
    if (!ALLOWED.includes(ext)) {
      showToast('不支持的文件类型：' + ext, 'error');
      return;
    }
    if (file.size > MAX_SIZE) {
      showToast('文件超过 50MB 限制', 'error');
      return;
    }
    selectedFile = file;
    document.getElementById('selectedFileName').textContent = file.name;
    document.getElementById('selectedFileSize').textContent = formatFileSize(file.size);
    fileSelected.style.display = 'flex';
    uploadZone.style.display = 'none';
    document.getElementById('fileFeedback').style.display = 'none';
  }

  uploadZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) selectFile(fileInput.files[0]); });

  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault(); uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
  });

  document.getElementById('fileRemove').addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    fileSelected.style.display = 'none';
    uploadZone.style.display = 'block';
  });

  // 表单提交
  const form = document.getElementById('uploadForm');
  const submitBtn = document.getElementById('submitBtn');

  function setInvalid(id, msg) {
    const el = document.getElementById(id);
    el.classList.add('is-invalid');
    const fb = document.getElementById(id + 'Feedback');
    if (fb) { fb.textContent = msg; fb.style.display = 'block'; }
  }
  function clearInvalid(id) {
    const el = document.getElementById(id);
    el.classList.remove('is-invalid');
    const fb = document.getElementById(id + 'Feedback');
    if (fb) fb.style.display = 'none';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    let valid = true;

    ['title','categoryId'].forEach(id => clearInvalid(id));
    document.getElementById('fileFeedback').style.display = 'none';

    const title = document.getElementById('title').value.trim();
    const categoryId = document.getElementById('categoryId').value;

    if (!title) { setInvalid('title', '请输入资源标题'); valid = false; }
    if (!categoryId) { setInvalid('categoryId', '请选择分类'); valid = false; }
    if (!selectedFile) {
      const fb = document.getElementById('fileFeedback');
      fb.textContent = '请选择要上传的文件';
      fb.style.display = 'block';
      valid = false;
    }

    if (!valid) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>上传中……';

    try {
      const formData = new FormData();
      formData.append('title', title);
      formData.append('description', document.getElementById('description').value.trim());
      formData.append('categoryId', categoryId);
      formData.append('file', selectedFile);

      const result = await API.upload('/api/resources', formData);
      showToast('上传成功！', 'success');

      const newId = result && (result.id || (result.resource && result.resource.id));
      if (newId) {
        setTimeout(() => { location.href = 'resource-detail.html?id=' + newId; }, 800);
      } else {
        setTimeout(() => { location.href = 'resources.html'; }, 800);
      }
    } catch {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="bi bi-cloud-upload me-2"></i>上传资源';
    }
  });
})();
</script>
</body>
</html>
