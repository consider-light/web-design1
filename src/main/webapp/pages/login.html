<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — CampusRes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<header id="navbar"></header>

<div class="container">
  <div class="form-card">
    <h1 class="form-title">欢迎回来</h1>
    <p class="form-subtitle">登录你的 CampusRes 账号</p>
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="username">用户名</label>
        <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required minlength="2" maxlength="50" autocomplete="username">
        <div class="invalid-feedback" id="usernameFeedback"></div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="password">密码</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required minlength="4" maxlength="100" autocomplete="current-password">
        <div class="invalid-feedback" id="passwordFeedback"></div>
      </div>
      <button type="submit" class="btn btn-primary-full" id="submitBtn">
        <i class="bi bi-box-arrow-in-right me-2"></i>登录
      </button>
    </form>
    <p class="form-switch-link">
      还没有账号？<a href="register.html">立即注册</a>
    </p>
  </div>
</div>

<footer id="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var submitting = false;
  var form = document.getElementById('loginForm');
  var submitBtn = document.getElementById('submitBtn');
  var username = document.getElementById('username');
  var password = document.getElementById('password');

  if (!form || !submitBtn) return;

  function setInvalid(el, msg) {
    el.classList.add('is-invalid');
    var fb = document.getElementById(el.id + 'Feedback');
    if (fb) fb.textContent = msg;
  }
  function clearInvalid(el) { el.classList.remove('is-invalid'); }
  function doPost(url, data) {
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(function(res) { return res.json(); });
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (submitting) return;

    var valid = true;
    clearInvalid(username); clearInvalid(password);

    if (!username.value.trim()) { setInvalid(username, '请输入用户名'); valid = false; }
    else if (username.value.trim().length < 2) { setInvalid(username, '用户名至少2个字符'); valid = false; }
    if (!password.value) { setInvalid(password, '请输入密码'); valid = false; }
    else if (password.value.length < 4) { setInvalid(password, '密码至少4个字符'); valid = false; }

    if (!valid) return;

    submitting = true;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>登录中……';

    doPost('/demo-1.0-SNAPSHOT/api/login', {
      username: username.value.trim(),
      password: password.value
    }).then(function(json) {
      if (json.code === 200 && json.data) {
        setCurrentUser(json.data);
        try { showToast('登录成功', 'success'); } catch(ignored) {}
        setTimeout(function() { location.replace('../index.html'); }, 400);
      } else {
        showToast(json.message || '登录失败', 'error');
        submitting = false;
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>登录';
      }
    }).catch(function(err) {
      console.error(err);
      submitting = false;
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>登录';
    });
  });
})();
</script>
</body>
</html>
