<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 — 管理后台 — CampusRes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
<header id="navbar"></header>

<div class="container py-4">
  <div class="breadcrumb-nav">
    <a href="../../index.html">首页</a><span class="separator">/</span>管理后台<span class="separator">/</span>用户管理
  </div>

  <div class="admin-header">
    <h2><i class="bi bi-people me-2"></i>用户管理</h2>
    <a href="resources.html" class="btn btn-outline-light btn-sm">资源管理 <i class="bi bi-arrow-right"></i></a>
  </div>

  <div id="loadingState">
    <div class="skeleton" style="height:300px;border-radius:var(--radius);"></div>
  </div>

  <div id="contentState" style="display:none;">
    <div class="admin-table">
      <table class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>角色</th>
            <th>注册时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
      </table>
    </div>
  </div>

  <div id="errorState" style="display:none;" class="empty-state">
    <span class="empty-icon"><i class="bi bi-exclamation-triangle"></i></span>
    <div class="empty-title">加载失败</div>
    <button class="btn btn-accent mt-3" onclick="location.reload()">重试</button>
  </div>

  <div id="emptyState" style="display:none;" class="empty-state">
    <span class="empty-icon"><i class="bi bi-people"></i></span>
    <div class="empty-title">暂无用户</div>
  </div>
</div>

<footer id="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/common.js"></script>
<script>
(async function() {
  const user = await checkAdmin();
  if (!user) return;

  async function loadUsers() {
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('contentState').style.display = 'none';
    document.getElementById('errorState').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';

    try {
      const data = await API.get('/api/admin/users');
      const users = data.records || data || [];

      document.getElementById('loadingState').style.display = 'none';

      if (!users.length) {
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      document.getElementById('contentState').style.display = 'block';
      document.getElementById('userTableBody').innerHTML = users.map(u => `
        <tr>
          <td>${u.id}</td>
          <td><strong>${escHtml(u.username)}</strong>${u.id === user.id ? ' <span class="badge badge-admin">当前</span>' : ''}</td>
          <td><span class="badge ${u.role === 'admin' ? 'badge-admin' : ''}" style="background:${u.role === 'admin' ? 'var(--accent)' : 'var(--border)'};padding:4px 10px;border-radius:12px;font-size:0.75rem;">${u.role === 'admin' ? '管理员' : '普通用户'}</span></td>
          <td>${formatDate(u.createdAt)}</td>
          <td>
            ${u.id !== user.id
              ? `<button class="btn-danger-sm delete-btn" data-id="${u.id}" data-name="${escHtml(u.username)}">删除</button>`
              : '<span class="text-muted" style="font-size:0.8rem;">当前用户</span>'}
          </td>
        </tr>`).join('');

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const uid = btn.dataset.id;
          const uname = btn.dataset.name;
          if (!confirm(`确定要删除用户「${uname}」吗？\n\n此操作不可撤销！`)) return;

          try {
            await API.del('/api/admin/users/' + uid);
            showToast('用户已删除', 'success');
            loadUsers();
          } catch {}
        });
      });
    } catch {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }
  }

  loadUsers();
})();
</script>
</body>
</html>
