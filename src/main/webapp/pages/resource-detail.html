<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资源详情 — CampusRes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<header id="navbar"></header>

<div class="container py-4" id="detailContainer">
  <div class="breadcrumb-nav">
    <a href="../index.html">首页</a><span class="separator">/</span><a href="resources.html">资源市场</a><span class="separator">/</span><span id="breadcrumbTitle">加载中……</span>
  </div>

  <!-- Loading -->
  <div id="loadingState">
    <div class="skeleton" style="height:36px;width:60%;margin-bottom:16px;"></div>
    <div class="skeleton" style="height:20px;width:40%;margin-bottom:32px;"></div>
    <div class="skeleton" style="height:200px;border-radius:var(--radius);"></div>
  </div>

  <!-- Content -->
  <div id="detailContent" style="display:none;">
    <div class="detail-header">
      <h1 id="resTitle"></h1>
      <div class="detail-meta" id="resMeta"></div>
    </div>

    <div class="row">
      <div class="col-lg-8">
        <div class="detail-content" id="resDesc"></div>
      </div>
      <div class="col-lg-4">
        <div class="sidebar" style="position:sticky;top:90px;">
          <div class="sidebar-title"><i class="bi bi-file-earmark me-2"></i>文件信息</div>
          <div id="fileInfo" style="font-size:0.9rem;">
            <p class="text-muted">加载中……</p>
          </div>
          <button class="download-btn-lg w-100 mt-3" id="downloadBtn">
            <i class="bi bi-download"></i> 下载资源
          </button>
          <p class="text-muted mt-2" style="font-size:0.75rem;text-align:center;" id="downloadCountText"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div id="errorState" style="display:none;" class="empty-state">
    <span class="empty-icon"><i class="bi bi-exclamation-triangle"></i></span>
    <div class="empty-title">资源不存在或已删除</div>
    <a href="resources.html" class="btn btn-accent mt-3">返回资源市场</a>
  </div>
</div>

<footer id="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script>
(async function() {
  const id = getQueryParam('id');
  if (!id) { showError(); return; }

  function showError() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('detailContent').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
  }

  function getCatTagCls(catId) {
    const map = { 1:'steam', 2:'vpn', 3:'bt', 4:'github', 5:'api', 6:'other' };
    return 'cat-tag cat-tag-' + (map[catId] || 'other');
  }

  try {
    const res = await API.get('/api/resources/' + id);
    if (!res) { showError(); return; }

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('detailContent').style.display = '';

    document.getElementById('breadcrumbTitle').textContent = res.title;
    document.getElementById('resTitle').textContent = res.title;
    document.getElementById('resMeta').innerHTML = `
      ${res.categoryId ? `<span class="${getCatTagCls(res.categoryId)}">${escHtml(res.categoryName || '')}</span>` : ''}
      <span><i class="bi bi-person"></i> ${escHtml(res.uploaderName || '匿名')}</span>
      <span><i class="bi bi-clock"></i> ${formatDate(res.createdAt)}</span>
      <span><i class="bi bi-download"></i> 下载 ${res.downloadCount || 0} 次</span>`;
    document.getElementById('resDesc').innerHTML = res.description
      ? `<p style="white-space:pre-wrap;">${escHtml(res.description)}</p>`
      : '<p class="text-muted">暂无描述</p>';

    document.getElementById('fileInfo').innerHTML = `
      <p><i class="bi bi-file-earmark me-2"></i><strong>文件名：</strong>${escHtml(res.originalName || '未知')}</p>
      <p><i class="bi bi-hdd me-2"></i><strong>大小：</strong>${res.fileSize ? formatFileSize(res.fileSize) : '未知'}</p>
      <p><i class="bi bi-calendar me-2"></i><strong>上传时间：</strong>${formatDate(res.createdAt)}</p>`;
    document.getElementById('downloadCountText').textContent = `已下载 ${res.downloadCount || 0} 次`;

    document.getElementById('downloadBtn').addEventListener('click', async function() {
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>准备下载……';

      try {
        const response = await API.download('/api/resources/' + id + '/download');
        if (!response.ok) throw new Error('下载失败');

        const blob = await response.blob();
        const disposition = response.headers.get('Content-Disposition') || '';
        const match = disposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
        let filename = 'download';
        if (match) {
          filename = match[1].replace(/['"]/g, '');
          try { filename = decodeURIComponent(filename); } catch {}
        }

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);

        btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>下载完成';
        setTimeout(() => { btn.innerHTML = '<i class="bi bi-download"></i> 下载资源'; btn.disabled = false; }, 2000);
        showToast('下载开始', 'success');
      } catch {
        btn.innerHTML = '<i class="bi bi-download"></i> 下载资源';
        btn.disabled = false;
        showToast('下载失败', 'error');
      }
    });
  } catch { showError(); }
})();
</script>
</body>
</html>
