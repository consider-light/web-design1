<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 — CampusRes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>

<header id="navbar"></header>

<div class="container">
  <div class="form-card">
    <h1 class="form-title">创建账号</h1>
    <p class="form-subtitle">加入 CampusRes，开始分享与发现</p>

    <div id="msg" style="display:none; padding:10px; border-radius:8px; margin-bottom:16px; text-align:center; font-weight:600;"></div>

    <form id="regForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="regUser">用户名</label>
        <input type="text" class="form-control" id="regUser" placeholder="2-50个字符" maxlength="50" autocomplete="username">
        <div class="invalid-feedback" id="regUserFeedback"></div>
      </div>
      <div class="mb-3">
        <label class="form-label" for="regPass">密码</label>
        <input type="password" class="form-control" id="regPass" placeholder="至少4个字符" maxlength="100" autocomplete="new-password">
        <div class="invalid-feedback" id="regPassFeedback"></div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="regPass2">确认密码</label>
        <input type="password" class="form-control" id="regPass2" placeholder="再次输入密码">
        <div class="invalid-feedback" id="regPass2Feedback"></div>
      </div>
      <button type="button" class="btn btn-primary-full" id="submitBtn" onclick="handleRegister()">
        <i class="bi bi-person-plus me-2"></i>注册
      </button>
    </form>
    <p class="form-switch-link">
      已有账号？<a href="login.html">去登录</a>
    </p>
  </div>
</div>

<footer id="footer"></footer>

<script>
  // === 极简导航栏和页脚（不依赖 common.js）===
  (function(){
    var nav = document.getElementById('navbar');
    if (nav) nav.innerHTML = '<nav class="navbar navbar-expand-lg fixed-top" id="mainNav" style="background:rgba(13,19,34,0.85);backdrop-filter:blur(18px);border-bottom:1px solid #1e2a40;padding:10px 0;"><div class="container"><a class="navbar-brand" href="../index.html" style="color:#e4e8f1;font-weight:700;font-size:1.35rem;"><span style="color:#e94560;margin-right:8px;">&#x25C8;</span>CampusRes</a></div></nav>';
    var footer = document.getElementById('footer');
    if (footer) footer.innerHTML = '<footer class="site-footer" style="margin-top:80px;padding:48px 0 24px;border-top:1px solid #1e2a40;color:#8896b0;text-align:center;"><p>&copy; 2026 CampusRes</p></footer>';
  })();

  // === 显示消息（成功/失败）===
  function showMsg(text, isSuccess) {
    var msgDiv = document.getElementById('msg');
    msgDiv.style.display = 'block';
    msgDiv.textContent = text;
    msgDiv.style.background = isSuccess ? 'rgba(0,230,118,0.12)' : 'rgba(233,69,96,0.12)';
    msgDiv.style.color = isSuccess ? '#00e676' : '#e94560';
    msgDiv.style.border = isSuccess ? '1px solid rgba(0,230,118,0.3)' : '1px solid rgba(233,69,96,0.3)';
  }

  // === 表单验证反馈 ===
  function setFeedback(id, msg) {
    var fb = document.getElementById(id);
    if (fb) {
      fb.textContent = msg;
      fb.style.display = 'block';
    }
    var inputId = id.replace('Feedback', '');
    var input = document.getElementById(inputId);
    if (input) input.classList.add('is-invalid');
  }

  function clearFeedbacks() {
    ['regUser', 'regPass', 'regPass2'].forEach(function(id) {
      var input = document.getElementById(id);
      if (input) input.classList.remove('is-invalid');
      var fb = document.getElementById(id + 'Feedback');
      if (fb) fb.style.display = 'none';
    });
  }

  // === 注册逻辑（原生 fetch，绝对路径跳转）===
  var busy = false;

  function handleRegister() {
    if (busy) return;

    var username = document.getElementById('regUser').value.trim();
    var password = document.getElementById('regPass').value;
    var confirm = document.getElementById('regPass2').value;

    clearFeedbacks();
    document.getElementById('msg').style.display = 'none';

    var valid = true;
    if (!username) {
      setFeedback('regUserFeedback', '请输入用户名');
      valid = false;
    } else if (username.length < 2) {
      setFeedback('regUserFeedback', '用户名至少2个字符');
      valid = false;
    }
    if (!password) {
      setFeedback('regPassFeedback', '请输入密码');
      valid = false;
    } else if (password.length < 4) {
      setFeedback('regPassFeedback', '密码至少4个字符');
      valid = false;
    }
    if (!confirm) {
      setFeedback('regPass2Feedback', '请确认密码');
      valid = false;
    } else if (password !== confirm) {
      setFeedback('regPass2Feedback', '两次输入的密码不一致');
      valid = false;
    }
    if (!valid) return;

    busy = true;
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>注册中……';

    // 使用绝对路径（与登录页保持一致的 API 地址）
    fetch('/demo-1.0-SNAPSHOT/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    })
            .then(function(res) { return res.json(); })
            .then(function(json) {
              if (json.code === 200) {
                showMsg('✓ 注册成功！正在跳转到登录页……', true);
                setTimeout(function() {
                  location.replace('../login.html');
                });
              } else {
                showMsg(json.message || '注册失败', false);
                busy = false;
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-person-plus me-2"></i>注册';
              }
            })
            .catch(function(err) {
              console.error(err);
              showMsg('网络错误，请检查后端服务', false);
              busy = false;
              btn.disabled = false;
              btn.innerHTML = '<i class="bi bi-person-plus me-2"></i>注册';
            });
  }
</script>

</body>
</html>
