<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资源市场 — CampusRes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<header id="navbar"></header>

<div class="container py-4">
  <!-- 面包屑 -->
  <div class="breadcrumb-nav">
    <a href="../index.html">首页</a><span class="separator">/</span>资源市场
  </div>

  <div class="row">
    <!-- 左侧分类侧栏 -->
    <div class="col-lg-2 col-md-3 mb-4">
      <div class="sidebar">
        <div class="sidebar-title"><i class="bi bi-grid me-2"></i>分类筛选</div>
        <a class="cat-link active" data-id="">全部资源</a>
        <div id="categoryLinks"></div>
      </div>
    </div>

    <!-- 右侧内容 -->
    <div class="col-lg-10 col-md-9">
      <!-- 顶栏：标题 + 搜索 -->
      <div class="d-flex justify-content-between align-items-center flex-wrap mb-4 gap-3">
        <h1 class="section-title mb-0">资源市场</h1>
        <div class="search-box-nav d-flex" style="width:260px;">
          <input type="text" id="searchInput" placeholder="搜索资源……" style="flex:1;">
          <button id="searchBtn"><i class="bi bi-search"></i></button>
        </div>
      </div>

      <!-- 资源列表 -->
      <div class="row g-3" id="resourceList">
        <div class="col-12"><div class="skeleton skeleton-card" style="height:140px;"></div></div>
        <div class="col-12"><div class="skeleton skeleton-card" style="height:140px;"></div></div>
        <div class="col-12"><div class="skeleton skeleton-card" style="height:140px;"></div></div>
      </div>

      <!-- 分页 -->
      <nav class="pagination-wrapper" id="pagination"></nav>
    </div>
  </div>
</div>

<footer id="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  let currentPage = 1, totalPages = 1;
  let currentCategoryId = parseInt(getQueryParam('categoryId')) || null;
  let currentKeyword = getQueryParam('keyword') || '';

  const searchInput = document.getElementById('searchInput');
  searchInput.value = currentKeyword;

  function getCatTagCls(catId) {
    const map = { 1:'steam', 2:'vpn', 3:'bt', 4:'github', 5:'api', 6:'other' };
    return 'cat-tag cat-tag-' + (map[catId] || 'other');
  }

  async function loadCategories() {
    try {
      const cats = await API.get('/api/resources/categories');
      const list = Array.isArray(cats) ? cats : (cats.records || cats || []);
      const el = document.getElementById('categoryLinks');
      el.innerHTML = list.map(c => `<a class="cat-link" data-id="${c.id}">${escHtml(c.name)}<span class="count">${c.resourceCount ?? ''}</span></a>`).join('');

      // 恢复选中状态
      if (currentCategoryId) {
        const active = el.querySelector(`[data-id="${currentCategoryId}"]`);
        if (active) { el.querySelectorAll('.cat-link').forEach(a => a.classList.remove('active')); active.classList.add('active'); }
      }

      el.querySelectorAll('.cat-link').forEach(link => {
        link.addEventListener('click', () => {
          el.querySelectorAll('.cat-link').forEach(a => a.classList.remove('active'));
          link.classList.add('active');
          currentCategoryId = link.dataset.id ? parseInt(link.dataset.id) : null;
          currentPage = 1;
          loadResources();
        });
      });
    } catch {}
  }

  async function loadResources() {
    const el = document.getElementById('resourceList');
    el.innerHTML = '<div class="col-12"><div class="skeleton skeleton-card" style="height:140px;"></div></div>'.repeat(3);

    const params = { page: currentPage, size: 10 };
    if (currentCategoryId) params.categoryId = currentCategoryId;
    if (currentKeyword) params.keyword = currentKeyword;

    try {
      const data = await API.get('/api/resources', params);
      const records = data.records || data || [];
      totalPages = data.totalPages || data.pages || 1;

      if (!records.length) {
        el.innerHTML = `<div class="col-12 empty-state">
          <span class="empty-icon"><i class="bi bi-inbox"></i></span>
          <div class="empty-title">没有找到资源</div>
          <div class="empty-desc">${currentKeyword ? '试试其他关键词？' : '暂时还没有资源，去上传第一个吧！'}</div>
          ${currentKeyword ? '' : '<a href="upload.html" class="btn btn-accent mt-3">上传资源</a>'}
        </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      el.innerHTML = records.map(r => `
        <div class="col-lg-6">
          <a href="resource-detail.html?id=${r.id}" class="text-decoration-none">
            <div class="resource-card">
              <div class="rc-title">${escHtml(r.title)}</div>
              <div class="rc-desc">${escHtml(r.description || '暂无描述')}</div>
              <div class="rc-meta">
                <span class="${getCatTagCls(r.categoryId)}">${escHtml(r.categoryName || '')}</span>
                <span><i class="bi bi-person"></i> ${escHtml(r.uploaderName || '匿名')}</span>
                <span><i class="bi bi-download"></i> ${r.downloadCount || 0}</span>
                <span><i class="bi bi-clock"></i> ${formatDate(r.createdAt)}</span>
              </div>
            </div>
          </a>
        </div>`).join('');

      renderPagination();
    } catch {
      el.innerHTML = `<div class="col-12 empty-state">
        <span class="empty-icon"><i class="bi bi-exclamation-triangle"></i></span>
        <div class="empty-title">加载失败</div>
        <div class="empty-desc">请检查后端服务是否启动</div>
        <button class="btn btn-accent mt-3" onclick="location.reload()">重试</button>
      </div>`;
    }
  }

  function renderPagination() {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }

    let html = '<ul class="pagination">';
    html += `<li class="page-item ${currentPage <= 1 ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${currentPage - 1}">上一页</a></li>`;

    for (let i = 1; i <= totalPages; i++) {
      if (totalPages > 7 && (i > 1 && i < currentPage - 1 && i !== 1)) {
        if (i === 2) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
        continue;
      }
      if (totalPages > 7 && (i < totalPages && i > currentPage + 1 && i !== totalPages)) {
        if (i === totalPages - 1) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
        continue;
      }
      html += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
    }

    html += `<li class="page-item ${currentPage >= totalPages ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${currentPage + 1}">下一页</a></li>`;
    html += '</ul>';
    el.innerHTML = html;

    el.querySelectorAll('[data-page]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const p = parseInt(link.dataset.page);
        if (p >= 1 && p <= totalPages && p !== currentPage) {
          currentPage = p;
          window.scrollTo({ top: 200, behavior: 'smooth' });
          loadResources();
        }
      });
    });
  }

  document.getElementById('searchBtn').addEventListener('click', () => {
    currentKeyword = searchInput.value.trim();
    currentPage = 1;
    loadResources();
  });
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      currentKeyword = e.target.value.trim();
      currentPage = 1;
      loadResources();
    }
  });

  // 重置分类
  document.querySelector('.sidebar .cat-link[data-id=""]').addEventListener('click', function() {
    document.querySelectorAll('.sidebar .cat-link').forEach(a => a.classList.remove('active'));
    this.classList.add('active');
    currentCategoryId = null;
    currentPage = 1;
    loadResources();
  });

  loadCategories();
  loadResources();
})();
</script>
</body>
</html>
